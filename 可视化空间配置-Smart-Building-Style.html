<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可视化空间配置 - Smart Building Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F3F4F6;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .room-group {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .room-group:hover {
            filter: brightness(0.95);
        }
        .room-group.active rect {
            stroke: #3b82f6;
            stroke-width: 3px;
            filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.4));
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chair-item-new {
            animation: slideIn 0.3s ease-out;
        }
        #canvas-container {
            cursor: grab;
        }
        #canvas-container:active {
            cursor: grabbing;
        }
        #floor-map {
            will-change: transform;
            transform-origin: center center;
            user-select: none;
        }
    </style>
</head>

            L

    <script>
        // 缩放和平移状态
        let currentZoom = 1;
        let panX = 0;
        let panY = 0;
        let isDragging = false;
        let startX, startY;
        let initialPanX, initialPanY;
        let currentRoom = '101'; // 当前选中房间ID
        
        let chairCounter = 1;
        const zoomDisplay = document.getElementById('zoom-level');
        const floorMap = document.getElementById('floor-map');
        const container = document.getElementById('canvas-container');
        const chairListContainer = document.getElementById('chair-list-container');

        // 统一更新变换
        function updateTransform() {
            floorMap.style.transform = `translate(calc(-50% + ${panX}px), calc(-50% + ${panY}px)) scale(${currentZoom})`;
            zoomDisplay.innerText = Math.round(currentZoom * 100) + '%';
        }

        // 调整缩放（按钮调用）
        function adjustZoom(delta) {
            currentZoom += delta;
            if (currentZoom < 0.5) currentZoom = 0.5;
            if (currentZoom > 1.5) currentZoom = 1.5;
            updateTransform();
        }

        // 滚轮缩放
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.1 : 0.1;
            currentZoom += delta;
            if (currentZoom < 0.5) currentZoom = 0.5;
            if (currentZoom > 1.5) currentZoom = 1.5;
            updateTransform();
        }, { passive: false });

        // 鼠标拖拽逻辑
        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            initialPanX = panX;
            initialPanY = panY;
            container.style.cursor = 'grabbing';
            e.preventDefault();
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            panX = initialPanX + dx;
            panY = initialPanY + dy;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                container.style.cursor = 'grab';
            }
        });

        // 下载SVG功能
        function downloadSvg() {
            const svgClone = floorMap.cloneNode(true);
            svgClone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
            svgClone.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');
            
            const serializer = new XMLSerializer();
            let svgString = serializer.serializeToString(svgClone);
            svgString = '<?xml version="1.0" standalone="no"?>\r\n' + svgString;
            
            const blob = new Blob([svgString], {type: 'image/svg+xml;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `floor-plan-${new Date().getTime()}.svg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // 上传SVG功能
        function uploadSvg() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.svg,image/svg+xml';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const svgText = event.target.result;
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(svgText, 'image/svg+xml');
                            const newSvg = doc.documentElement;
                            
                            if (newSvg.tagName !== 'svg' && newSvg.tagName !== 'SVG') {
                                alert('无效的文件格式，请上传有效的SVG文件');
                                return;
                            }
                            
                            newSvg.id = 'floor-map';
                            newSvg.classList.add('absolute', 'top-1/2', 'left-1/2', 'bg-white', 'rounded-3xl', 'shadow-xl', 'border', 'border-white/50');
                            newSvg.style.marginLeft = '-400px';
                            newSvg.style.marginTop = '-300px';
                            
                            if (!newSvg.getAttribute('viewBox')) {
                                newSvg.setAttribute('viewBox', '0 0 800 600');
                            }
                            if (!newSvg.getAttribute('width')) {
                                newSvg.setAttribute('width', '800');
                            }
                            if (!newSvg.getAttribute('height')) {
                                newSvg.setAttribute('height', '600');
                            }
                            
                            floorMap.parentNode.replaceChild(newSvg, floorMap);
                            window.floorMap = newSvg;
                            
                            bindRoomEvents();
                            
                            // 上传后默认选中第一个房间
                            const firstRoom = newSvg.querySelector('[data-room-id], [id^="room-"]');
                            if (firstRoom) {
                                const roomId = firstRoom.getAttribute('data-room-id') || firstRoom.id.replace('room-', '');
                                selectRoom(roomId);
                            }
                            
                            panX = 0;
                            panY = 0;
                            currentZoom = 1;
                            updateTransform();
                            
                        } catch (error) {
                            console.error('上传失败:', error);
                            alert('SVG文件解析失败，请检查文件格式');
                        }
                    };
                    reader.readAsText(file);
                }
            };
            input.click();
        }

        // 绑定房间事件（用于上传后重新绑定）
        function bindRoomEvents() {
            const svg = document.getElementById('floor-map');
            const roomGroups = svg.querySelectorAll('[data-room-id], [id^="room-"]');
            
            roomGroups.forEach(group => {
                const newGroup = group.cloneNode(true);
                group.parentNode.replaceChild(newGroup, group);
                
                newGroup.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const roomId = newGroup.getAttribute('data-room-id') || newGroup.id.replace('room-', '');
                    selectRoom(roomId);
                });
                
                newGroup.style.cursor = 'pointer';
            });
        }

        // 核心联动函数：同步SVG、左侧栏、右侧表单
        function selectRoom(roomId) {
            if (isDragging) return;
            currentRoom = roomId;
            
            // 1. 重置所有SVG房间样式
            document.querySelectorAll('.room-group').forEach((el, index) => {
                el.classList.remove('active');
                const rect = el.querySelector('rect');
                if (rect) {
                    // 根据房间ID恢复默认边框色
                    const elRoomId = el.getAttribute('data-room-id') || el.id.replace('room-', '');
                    if (elRoomId === '101' || elRoomId === '201') {
                        rect.setAttribute('stroke', '#3b82f6'); // 蓝色
                        rect.setAttribute('stroke-width', '2');
                    } else {
                        rect.setAttribute('stroke', '#bbf7d0'); // 绿色
                        rect.setAttribute('stroke-width', '1');
                    }
                }
            });

            // 2. 高亮当前选中的SVG房间
            const selectedGroup = document.getElementById(`room-${roomId}`);
            if (selectedGroup) {
                selectedGroup.classList.add('active');
                // 强制触发重绘以确保阴影效果
                const rect = selectedGroup.querySelector('rect');
                if (rect) {
                    rect.setAttribute('stroke', '#3b82f6');
                    rect.setAttribute('stroke-width', '3');
                }
            }

            // 3. 重置左侧栏所有房间样式
            document.querySelectorAll('.room-list-item').forEach((el, index) => {
                el.classList.remove('bg-blue-600', 'text-white', 'shadow-md');
                el.classList.add('bg-white', 'text-slate-600', 'hover:bg-slate-50');
                
                const dot = el.querySelector('div:first-child');
                if(dot) {
                    dot.classList.remove('bg-white');
                    // 恢复默认圆点色：第一个（101）蓝色，第二个（102）绿色
                    if (index === 0) {
                        dot.classList.add('bg-blue-500');
                    } else if (index === 1) {
                        dot.classList.add('bg-green-500');
                    }
                }
            });

            // 4. 高亮左侧栏对应房间
            const listItems = document.querySelectorAll('.room-list-item');
            let targetIndex = -1;
            let roomName = '';
            
            if(roomId === '101' || roomId === '201') {
                targetIndex = 0;
                roomName = roomId === '101' ? '101 会议室' : '201 校长室';
                // 更新左侧栏101样式
                listItems[0].classList.remove('bg-white', 'text-slate-600', 'hover:bg-slate-50');
                listItems[0].classList.add('bg-blue-600', 'text-white', 'shadow-md');
                const dot = listItems[0].querySelector('div:first-child');
                if(dot) {
                    dot.classList.remove('bg-blue-500');
                    dot.classList.add('bg-white');
                }
            } else if (roomId === '102' || roomId === '202') {
                targetIndex = 1;
                roomName = roomId === '102' ? '102 财务处' : '202 教务处';
                // 更新左侧栏102样式
                listItems[1].classList.remove('bg-white', 'text-slate-600', 'hover:bg-slate-50');
                listItems[1].classList.add('bg-blue-600', 'text-white', 'shadow-md');
                const dot = listItems[1].querySelector('div:first-child');
                if(dot) {
                    dot.classList.remove('bg-green-500');
                    dot.classList.add('bg-white');
                }
            }

            // 5. 同步更新右侧表单中的房间名称
            const inputName = document.getElementById('input-name');
            if(inputName && roomName) {
                inputName.value = roomName;
            }
        }

        function switchFloor(btn, floor) {
            const parent = btn.parentElement;
            const buttons = parent.querySelectorAll('button');
            buttons.forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white', 'shadow-sm');
                b.classList.add('text-slate-500');
            });
            btn.classList.remove('text-slate-500');
            btn.classList.add('bg-blue-600', 'text-white', 'shadow-sm');
            
            // 更新左侧栏房间名称（模拟楼层切换）
            const list101 = document.getElementById('list-101');
            const list102 = document.getElementById('list-102');
            
            if(floor === '2F') {
                if(list101) list101.querySelector('span').textContent = '201 校长室';
                if(list102) list102.querySelector('span').textContent = '202 教务处';
                // 更新SVG中的文字（通过重新渲染或修改DOM）
                const text101 = document.querySelector('#room-101 foreignObject div div:nth-child(2)');
                const text102 = document.querySelector('#room-102 foreignObject div div:nth-child(2)');
                if(text101) text101.textContent = '201 校长室';
                if(text102) text102.textContent = '202 教务处';
            } else {
                if(list101) list101.querySelector('span').textContent = '101 会议室';
                if(list102) list102.querySelector('span').textContent = '102 财务处';
                const text101 = document.querySelector('#room-101 foreignObject div div:nth-child(2)');
                const text102 = document.querySelector('#room-102 foreignObject div div:nth-child(2)');
                if(text101) text101.textContent = '101 会议室';
                if(text102) text102.textContent = '102 财务处';
            }
            
            // 切换楼层后保持当前房间选中状态，但更新名称
            if(currentRoom) {
                selectRoom(currentRoom);
            }
            
            panX = 0;
            panY = 0;
            currentZoom = 1;
            updateTransform();
        }

        // Tab Switching Logic
        function switchTab(tabName) {
            const basicBtn = document.getElementById('tab-basic');
            const chairBtn = document.getElementById('tab-chair');
            const basicPanel = document.getElementById('panel-basic');
            const chairPanel = document.getElementById('panel-chair');
            
            if (tabName === 'basic') {
                basicBtn.classList.add('bg-blue-600', 'text-white', 'shadow-sm');
                basicBtn.classList.remove('text-slate-500', 'hover:text-slate-700');
                chairBtn.classList.remove('bg-blue-600', 'text-white', 'shadow-sm');
                chairBtn.classList.add('text-slate-500', 'hover:text-slate-700');
                basicPanel.classList.remove('hidden');
                chairPanel.classList.add('hidden');
            } else if (tabName === 'chair') {
                chairBtn.classList.add('bg-blue-600', 'text-white', 'shadow-sm');
                chairBtn.classList.remove('text-slate-500', 'hover:text-slate-700');
                basicBtn.classList.remove('bg-blue-600', 'text-white', 'shadow-sm');
                basicBtn.classList.add('text-slate-500', 'hover:text-slate-700');
                chairPanel.classList.remove('hidden');
                basicPanel.classList.add('hidden');
            }
        }

        // Add new chair item
        function addChairItem() {
            chairCounter++;
            const newItem = document.createElement('div');
            newItem.className = 'chair-item chair-item-new bg-slate-50 rounded-xl p-5 space-y-4 border border-slate-100 relative group';
            
            const newCode = `CH-${currentRoom === '101' ? '101' : (currentRoom === '102' ? '102' : '101')}-${String.fromCharCode(64 + chairCounter)}`;
            
            newItem.innerHTML = `
                <button onclick="removeChairItem(this)" class="absolute top-3 right-3 w-7 h-7 flex items-center justify-center rounded-full bg-red-50 text-red-500 hover:bg-red-500 hover:text-white transition-all opacity-0 group-hover:opacity-100 shadow-sm" title="删除">
                    <i class="ph ph-trash text-sm"></i>
                </button>
                
                <div class="space-y-2">
                    <label class="text-xs text-slate-500 font-medium">牙椅位编码</label>
                    <div class="flex items-center gap-2">
                        <input type="text" value="${newCode}" placeholder="请输入编码" class="flex-1 bg-white border border-slate-200 text-slate-800 py-2.5 px-3 rounded-lg text-sm focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 font-medium shadow-sm">
                        
                        <!-- 说明图标和悬浮提示（动态新增时也包含） -->
                        <div class="relative group/tooltip flex-shrink-0">
                            <i class="ph ph-info text-slate-400 hover:text-blue-500 cursor-help text-lg transition-colors"></i>
                            
                            <!-- 悬浮提示框 -->
                            <div class="absolute bottom-full right-0 mb-2 w-72 bg-slate-800 text-white text-xs rounded-lg py-3 px-3 opacity-0 invisible group-hover/tooltip:opacity-100 group-hover/tooltip:visible transition-all duration-200 shadow-xl z-50 pointer-events-none">
                                <div class="font-semibold mb-1 text-slate-200">编码规则说明：</div>
                                <div class="leading-relaxed text-slate-300">
                                    编码由楼幢、楼层、牙椅号组成；如AF01C02，A代表楼幢，多个楼幢则按字母顺序，F01代表1楼，C02代表该楼层的第2张牙椅
                                </div>
                                <!-- 小三角箭头 -->
                                <div class="absolute top-full right-3 -mt-1 border-4 border-transparent border-t-slate-800"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="space-y-2">
                    <label class="text-xs text-slate-500 font-medium">牙椅资产编号</label>
                    <div class="relative">
                        <select class="w-full bg-white border border-slate-200 text-slate-800 py-2.5 px-3 rounded-lg text-sm focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 appearance-none font-medium shadow-sm">
                            <option value="">请选择资产编号</option>
                            <option>西门子 SINIUS (00${chairCounter})</option>
                            <option>卡瓦 Dental (00${chairCounter + 10})</option>
                            <option>普兰梅卡 Planmeca (00${chairCounter + 20})</option>
                        </select>
                        <i class="ph ph-caret-down absolute right-3 top-3 text-slate-400"></i>
                    </div>
                </div>
            `;
            
            chairListContainer.appendChild(newItem);
            chairListContainer.scrollTop = chairListContainer.scrollHeight;
            
            setTimeout(() => {
                newItem.classList.remove('chair-item-new');
            }, 300);
        }

        // Remove chair item
        function removeChairItem(btn) {
            const item = btn.closest('.chair-item');
            if (item) {
                item.style.opacity = '0';
                item.style.transform = 'translateX(20px)';
                item.style.transition = 'all 0.2s ease';
                
                setTimeout(() => {
                    item.remove();
                }, 200);
            }
        }

        // 初始化：选中默认房间101，确保三方联动状态一致
        document.addEventListener('DOMContentLoaded', () => {
            selectRoom('101');
            updateTransform();
        });
    </script>
</body>
